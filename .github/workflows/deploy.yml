name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  # 允许手动在 GitHub 页面点击按钮触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境 (根据你的项目需求调整版本，建议 18 或 20+)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm i

      # 4. 构建项目 (生成静态文件)
      # Nuxt 3 静态生成命令通常是 npm run generate
      - name: Build project
        run: npm run generate

      # 5. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist 